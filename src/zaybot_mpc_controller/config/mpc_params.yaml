# MPC Controller 参数配置示例
# 粘贴到 nav2_params.yaml 的 controller_server.ros__parameters 下。
# 插件键名须为 FollowPath（与 Nav2 默认行为树 FollowPath 节点的 controller_id 一致）。

FollowPath:
  plugin: "axioma_mpc_controller::MPCControllerPlugin"
  
  # 速度限制
  max_vel_x: 0.26        # 最大线速度（m/s）
  min_vel_x: 0.0         # 最小线速度（m/s）
  max_vel_theta: 1.0      # 最大角速度（rad/s）
  min_vel_theta: -1.0    # 最小角速度（rad/s），差速车建议与 max 对称
  
  # 加速度限制
  acc_lim_x: 2.5         # 线加速度限制（m/s²）
  acc_lim_theta: 3.2     # 角加速度限制（rad/s²）
  
  # MPC 参数
  prediction_horizon: 10  # 预测时域长度（步数）
  dt: 0.1                 # 时间步长（秒）
  
  # 权重矩阵（状态权重 Q）
  Q: [10.0, 10.0, 5.0]    # [x, y, theta] 状态权重，值越大越重视该状态
  
  # 权重矩阵（控制权重 R）
  R: [1.0, 1.0]           # [v, omega] 控制权重，值越大越平滑
  
  # 权重矩阵（终端权重 P）
  P: [50.0, 50.0, 20.0]   # [x, y, theta] 终端权重，值越大越重视终端误差
