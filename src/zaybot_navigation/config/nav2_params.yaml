# ============================================================================
# 地图服务器配置
# 功能：加载和发布占用栅格地图
# ============================================================================
map_server:
  ros__parameters:
    use_sim_time: True  # 是否使用仿真时间
    yaml_filename: ""   # 地图 YAML 文件路径（由 launch 文件传入）

# ============================================================================
# AMCL (自适应蒙特卡洛定位) 配置
# 功能：在已知地图中估计机器人位姿，使用粒子滤波算法
# ============================================================================
amcl:
  ros__parameters:
    use_sim_time: True
    
    # 运动模型噪声参数（值越小，越信任里程计，定位越精确但响应越慢）
    alpha1: 0.05  # 旋转对旋转的噪声（机器人旋转时角度误差）
    alpha2: 0.05  # 旋转对平移的噪声（旋转导致的平移误差）
    alpha3: 0.05  # 平移对平移的噪声（平移时的距离误差）
    alpha4: 0.05  # 平移对旋转的噪声（平移导致的旋转误差）
    alpha5: 0.05  # 附加噪声（其他未建模的误差）
    
    # 坐标系配置
    base_frame_id: "base_link"   # 机器人基座坐标系
    global_frame_id: "map"       # 全局地图坐标系
    odom_frame_id: "odom"        # 里程计坐标系
    
    # 激光扫描匹配参数
    beam_skip_distance: 0.5           # 光束跳过的距离阈值（米）
    beam_skip_error_threshold: 0.9    # 光束跳过错误阈值
    beam_skip_threshold: 0.3           # 光束跳过阈值
    do_beamskip: false                 # 是否启用光束跳过功能
    
    # 激光模型参数
    lambda_short: 0.1                  # 短距离测量权重
    laser_likelihood_max_dist: 2.0     # 激光似然场最大距离（米）
    laser_max_range: 10.0              # 激光最大检测范围（米）
    laser_min_range: 0.12              # 激光最小检测范围（米）
    laser_model_type: "likelihood_field"  # 激光模型类型：似然场模型
    max_beams: 120                     # 用于定位的最大激光束数（越多越精确但计算越慢）
    scan_topic: scan                   # 激光扫描话题名称
    
    # 粒子滤波参数
    max_particles: 5000    # 最大粒子数（越多越精确但计算量越大）
    min_particles: 1000    # 最小粒子数（粒子数低于此值时重采样）
    pf_err: 0.01           # 粒子滤波误差阈值（越小越精确）
    pf_z: 0.99             # 粒子滤波有效粒子比例阈值
    resample_interval: 1   # 重采样间隔（每N次更新重采样一次）
    
    # 恢复参数（当定位失败时使用）
    recovery_alpha_fast: 0.1   # 快速恢复时的运动噪声（快速扩散粒子）
    recovery_alpha_slow: 0.001 # 慢速恢复时的运动噪声（慢速扩散粒子）
    
    # 机器人运动模型
    robot_model_type: "nav2_amcl::DifferentialMotionModel"  # 差速驱动运动模型
    
    # 更新触发条件（减少不必要的计算）
    update_min_a: 0.1  # 最小角度变化（弧度），超过此值才更新定位
    update_min_d: 0.1  # 最小距离变化（米），超过此值才更新定位
    
    # 激光测量模型权重
    z_hit: 0.5    # 正确测量的权重
    z_max: 0.05   # 最大范围测量的权重
    z_rand: 0.5   # 随机测量的权重
    z_short: 0.05 # 短距离测量的权重
    sigma_hit: 0.2  # 测量噪声标准差
    
    # 其他参数
    save_pose_rate: 0.5              # 保存位姿的频率（Hz）
    tf_broadcast: true               # 是否广播 TF 变换（map → odom）
    transform_tolerance: 1.0          # TF 变换容差（秒）
    set_initial_pose: false          # 是否设置初始位姿
    always_reset_initial_pose: false # 是否总是重置初始位姿
    first_map_only: false            # 是否只使用第一张地图

# ============================================================================
# 行为树导航器配置
# 功能：协调整个导航流程，管理路径规划、跟踪、恢复等行为
# ============================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map              # 全局坐标系
    robot_base_frame: base_link    # 机器人基座坐标系
    odom_topic: /odom              # 里程计话题
    bt_loop_duration: 10           # 行为树循环周期（毫秒）
    default_server_timeout: 20     # 默认服务器超时时间（秒）
    
    # Groot 监控配置（可视化行为树）
    enable_groot_monitoring: True   # 是否启用 Groot 监控
    groot_zmq_publisher_port: 1666  # Groot 发布端口
    groot_zmq_server_port: 1667    # Groot 服务器端口
    # 行为树插件列表（所有可用的行为树节点）
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node      # 计算到目标位姿的路径
    - nav2_compute_path_through_poses_action_bt_node # 计算通过多个点的路径
    - nav2_smooth_path_action_bt_node               # 平滑路径
    - nav2_follow_path_action_bt_node              # 跟踪路径
    - nav2_spin_action_bt_node                     # 旋转行为
    - nav2_wait_action_bt_node                      # 等待行为
    - nav2_back_up_action_bt_node                  # 后退行为
    - nav2_drive_on_heading_bt_node                # 按方向行驶
    - nav2_clear_costmap_service_bt_node            # 清除代价地图服务
    - nav2_is_stuck_condition_bt_node              # 判断是否卡住
    - nav2_goal_reached_condition_bt_node          # 判断是否到达目标
    - nav2_goal_updated_condition_bt_node         # 判断目标是否更新
    - nav2_globally_updated_goal_condition_bt_node  # 判断全局目标是否更新
    - nav2_is_path_valid_condition_bt_node        # 判断路径是否有效
    - nav2_initial_pose_received_condition_bt_node # 判断是否收到初始位姿
    - nav2_reinitialize_global_localization_service_bt_node # 重新初始化全局定位
    - nav2_rate_controller_bt_node                  # 速率控制器
    - nav2_distance_controller_bt_node              # 距离控制器
    - nav2_speed_controller_bt_node                 # 速度控制器
    - nav2_truncate_path_action_bt_node             # 截断路径
    - nav2_truncate_path_local_action_bt_node       # 局部截断路径
    - nav2_goal_updater_node_bt_node                # 目标更新节点
    - nav2_recovery_node_bt_node                    # 恢复节点
    - nav2_pipeline_sequence_bt_node                # 流水线序列节点
    - nav2_round_robin_node_bt_node                 # 轮询节点
    - nav2_transform_available_condition_bt_node   # 判断 TF 是否可用
    - nav2_time_expired_condition_bt_node          # 判断时间是否过期
    - nav2_path_expiring_timer_condition           # 路径过期定时器
    - nav2_distance_traveled_condition_bt_node      # 判断是否移动了足够距离
    - nav2_single_trigger_bt_node                   # 单次触发节点
    - nav2_is_battery_low_condition_bt_node       # 判断电池是否低电量
    - nav2_navigate_through_poses_action_bt_node    # 通过多个位姿导航
    - nav2_navigate_to_pose_action_bt_node         # 导航到单个位姿
    - nav2_remove_passed_goals_action_bt_node      # 移除已通过的目标
    - nav2_planner_selector_bt_node                 # 规划器选择器
    - nav2_controller_selector_bt_node              # 控制器选择器
    - nav2_goal_checker_selector_bt_node           # 目标检查器选择器
    - nav2_controller_cancel_bt_node                # 取消控制器
    - nav2_path_longer_on_approach_bt_node         # 接近时路径变长
    - nav2_wait_cancel_bt_node                      # 取消等待
    - nav2_spin_cancel_bt_node                      # 取消旋转
    - nav2_back_up_cancel_bt_node                   # 取消后退
    - nav2_drive_on_heading_cancel_bt_node         # 取消按方向行驶

# ============================================================================
# 控制器服务器配置
# 功能：局部路径跟踪和避障控制
# ============================================================================
controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0  # 控制器运行频率（Hz），越高响应越快但计算量越大
    
    # 速度阈值（低于此值认为机器人停止）
    min_x_velocity_threshold: 0.001      # 最小 x 方向速度（m/s）
    min_y_velocity_threshold: 0.5        # 最小 y 方向速度（m/s）
    min_theta_velocity_threshold: 0.001  # 最小角速度（rad/s）
    
    failure_tolerance: 0.3  # 失败容忍度（控制器失败多少次后认为导航失败）
    progress_checker_plugin: "progress_checker"  # 进度检查器插件
    goal_checker_plugins: ["general_goal_checker"]  # 目标检查器插件列表
    # 默认行为树 FollowPath 节点的 controller_id 固定为 "FollowPath"，必须与下列名称一致
    controller_plugins: ["FollowPath"]

    # 进度检查器：检查机器人是否在前进
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2   # 要求的移动半径（米），越小越不容易误判“卡住”
      movement_time_allowance: 15.0  # 移动时间限制（秒），给狭窄区域/恢复动作更多时间

    # 目标检查器：检查是否到达目标
    general_goal_checker:
      stateful: True  # 是否保持状态
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15   # xy 方向目标容差（米），在此范围内认为到达
      yaw_goal_tolerance: 0.25  # 朝向目标容差（弧度），在此范围内认为到达

    # 局部路径跟踪：插件名必须为 FollowPath（与行为树 FollowPath 节点的 controller_id 一致）
    # 改回 DWB：将 plugin 换为 dwb_core::DWBLocalPlanner，并恢复 DWB 相关参数（见仓库历史或 Nav2 文档）
    FollowPath:
      plugin: "axioma_mpc_controller::MPCControllerPlugin"
      
      # 速度限制（差速车角速度需对称，否则无法单侧转向）
      max_vel_x: 0.26        # 最大线速度（m/s）
      min_vel_x: 0.0         # 最小线速度（m/s）
      max_vel_theta: 1.0     # 最大角速度（rad/s）
      min_vel_theta: -1.0    # 最小角速度（rad/s），与 max 对称
      
      # 加速度限制
      acc_lim_x: 2.5         # 线加速度限制（m/s²）
      acc_lim_theta: 3.2     # 角加速度限制（rad/s²）
      
      # MPC 参数
      prediction_horizon: 10  # 预测时域长度（步数）
      dt: 0.1                 # 时间步长（秒）
      
      Q: [10.0, 10.0, 5.0]    # 状态权重 [x, y, theta]
      R: [1.0, 1.0]           # 控制权重 [v, omega]
      P: [50.0, 50.0, 20.0]   # 终端权重 [x, y, theta]

      # 障碍物代价（用于减少贴墙/卡死：在采样预测轨迹上加入 costmap 代价）
      footprint_radius: 0.22         # 近似机器人圆形外接半径（米）
      lethal_cost_threshold: 253     # >=该阈值视为不可行（253=inscribed, 254=lethal）
      obstacle_cost_weight: 200.0    # 障碍代价权重，越大越远离障碍
      unknown_cost_penalty: 10.0     # NO_INFORMATION 的代价惩罚
      obstacle_sample_points: 8      # footprint 环采样点数（越大越保守，越耗时）

      # 防止“发呆”（距离参考较远时，惩罚近似零速的候选控制）
      stop_penalty: 50.0
      stop_vel_threshold: 0.01
      stop_omega_threshold: 0.05

# ============================================================================
# 局部代价地图配置
# 功能：实时构建机器人周围的障碍物地图，用于局部避障
# ============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0   # 更新频率（Hz），越高越实时但计算量越大
      publish_frequency: 2.0   # 发布频率（Hz），向其他节点发布代价地图的频率
      global_frame: odom       # 全局坐标系（局部代价地图使用里程计坐标系）
      robot_base_frame: base_link  # 机器人基座坐标系
      use_sim_time: True
      rolling_window: true     # 是否使用滚动窗口（代价地图跟随机器人移动）
      width: 3                 # 代价地图宽度（米）
      height: 3                # 代价地图高度（米）
      resolution: 0.05         # 分辨率（米/像素），越小越精确但内存越大
      robot_radius: 0.15        # 机器人半径（米），用于碰撞检测
      
      plugins: ["voxel_layer", "inflation_layer"]  # 插件列表
      # voxel_layer: 3D 体素层，检测障碍物
      # inflation_layer: 膨胀层，在障碍物周围创建安全区域
      
      # 膨胀层配置：在障碍物周围创建代价梯度
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0   # 代价缩放因子，控制代价增长速度
        inflation_radius: 0.55      # 膨胀半径（米），障碍物周围的安全距离
      
      # 体素层配置：3D 障碍物检测
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True                # 是否启用
        publish_voxel_map: True      # 是否发布体素地图
        origin_z: 0.0                # 原点 z 坐标（米）
        z_resolution: 0.05           # z 方向分辨率（米）
        z_voxels: 16                 # z 方向体素数
        max_obstacle_height: 2.0     # 最大障碍物高度（米）
        mark_threshold: 0            # 标记阈值（体素值超过此值认为是障碍物）
        
        # 观测源配置
        observation_sources: scan    # 观测源列表（激光雷达）
        scan:
          topic: /scan               # 激光扫描话题
          max_obstacle_height: 2.0   # 最大障碍物高度（米）
          clearing: True             # 是否清除已通过的障碍物
          marking: True               # 是否标记新障碍物
          data_type: "LaserScan"     # 数据类型
          raytrace_max_range: 3.0    # 光线追踪最大范围（米），用于清除障碍物
          raytrace_min_range: 0.0    # 光线追踪最小范围（米）
          obstacle_max_range: 2.5    # 障碍物检测最大范围（米）
          obstacle_min_range: 0.0    # 障碍物检测最小范围（米）
      
      always_send_full_costmap: True  # 是否总是发送完整代价地图

# ============================================================================
# 全局代价地图配置
# 功能：构建整个地图的障碍物信息，用于全局路径规划
# ============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0   # 更新频率（Hz），全局地图更新较慢
      publish_frequency: 1.0  # 发布频率（Hz）
      global_frame: map       # 全局坐标系（使用地图坐标系）
      robot_base_frame: base_link  # 机器人基座坐标系
      use_sim_time: True
      robot_radius: 0.15      # 机器人半径（米），尽量与实际底盘一致
      resolution: 0.05        # 分辨率（米/像素）
      track_unknown_space: true  # 是否跟踪未知空间
      
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      # static_layer: 静态层，从地图文件加载
      # obstacle_layer: 障碍物层，从传感器数据更新
      # inflation_layer: 膨胀层，创建安全区域
      
      # 障碍物层配置
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True      # 清除已通过的障碍物
          marking: True       # 标记新障碍物
          data_type: "LaserScan"
          raytrace_max_range: 3.0   # 光线追踪范围（米）
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5  # 障碍物检测范围（米）
          obstacle_min_range: 0.0
      
      # 静态层配置：从地图文件加载
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True  # 使用瞬态本地订阅
      
      # 膨胀层配置
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0   # 代价缩放因子
        inflation_radius: 0.45      # 膨胀半径（米），过大容易导致 NavFn 无路可走
      
      always_send_full_costmap: True

# ============================================================================
# 路径规划器服务器配置
# 功能：计算从起点到终点的全局路径
# ============================================================================
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0  # 期望的规划频率（Hz）
    use_sim_time: True
    planner_plugins: ["GridBased"]    # 规划器插件列表
    
    # 基于网格的规划器（NavFn）
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"  # NavFn 规划器
      tolerance: 0.5        # 容差（米），路径可以偏离目标点的距离
      use_astar: false      # 是否使用 A* 算法（false 使用 Dijkstra）
      allow_unknown: true   # 是否允许在未知空间中规划

# ============================================================================
# 路径平滑器服务器配置
# 功能：平滑全局路径，使其更适合机器人跟踪
# ============================================================================
smoother_server:
  ros__parameters:
    use_sim_time: True
    smoother_plugins: ["simple_smoother"]  # 平滑器插件列表
    
    # 简单平滑器
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10    # 容差（收敛精度）
      max_its: 1000         # 最大迭代次数
      do_refinement: True   # 是否进行细化

# ============================================================================
# 行为服务器配置
# 功能：提供恢复行为（旋转、后退等），当机器人卡住时使用
# ============================================================================
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw      # 代价地图话题
    footprint_topic: local_costmap/published_footprint  # 机器人轮廓话题
    cycle_frequency: 10.0    # 循环频率（Hz）
    
    # 行为插件列表
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    # spin: 旋转行为（原地旋转寻找出路）
    # backup: 后退行为（向后移动）
    # drive_on_heading: 按方向行驶（按指定方向移动）
    # wait: 等待行为（暂停一段时间）
    
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    
    global_frame: odom           # 全局坐标系
    robot_base_frame: base_link  # 机器人基座坐标系
    transform_tolerance: 0.1      # TF 变换容差（秒）
    use_sim_time: true
    simulate_ahead_time: 2.0     # 仿真提前时间（秒）
    max_rotational_vel: 1.0       # 最大旋转速度（rad/s）
    min_rotational_vel: 0.4       # 最小旋转速度（rad/s）
    rotational_acc_lim: 3.2       # 旋转加速度限制（rad/s²）

# ============================================================================
# 机器人状态发布器配置
# 功能：根据 URDF 和关节状态发布 TF 树
# ============================================================================
robot_state_publisher:
  ros__parameters:
    use_sim_time: True

# ============================================================================
# 航点跟随器配置
# 功能：按顺序访问多个航点
# ============================================================================
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20                 # 循环频率（Hz）
    stop_on_failure: false        # 失败时是否停止
    waypoint_task_executor_plugin: "wait_at_waypoint"  # 航点任务执行器
    
    # 在航点等待
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True               # 是否启用
      waypoint_pause_duration: 200  # 在航点暂停时间（毫秒）

# ============================================================================
# 速度平滑器配置
# 功能：平滑速度命令，避免突然加速/减速
# ============================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0     # 平滑频率（Hz）
    scale_velocities: False       # 是否缩放速度
    feedback: "OPEN_LOOP"         # 反馈模式：开环（不使用实际速度反馈）
    
    # 速度限制 [x, y, theta]
    max_velocity: [0.26, 0.0, 1.0]   # 最大速度 (m/s, m/s, rad/s)
    min_velocity: [-0.26, 0.0, -1.0] # 最小速度 (m/s, m/s, rad/s)
    
    # 加速度限制 [x, y, theta]
    max_accel: [2.5, 0.0, 3.2]    # 最大加速度 (m/s², m/s², rad/s²)
    max_decel: [-2.5, 0.0, -3.2]  # 最大减速度 (m/s², m/s², rad/s²)
    
    odom_topic: "odom"            # 里程计话题（用于闭环反馈，但当前是开环）
    odom_duration: 0.1            # 里程计数据有效期（秒）
    deadband_velocity: [0.0, 0.0, 0.0]  # 死区速度（低于此值输出为0）
    velocity_timeout: 1.0         # 速度超时（秒），超过此时间未收到速度命令则停止
